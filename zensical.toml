[project]
site_name = "citation-report"
site_description = "Python regex patterns and report extraction for Philippine legal citations."
site_author = "Marcelino Veloso III"
site_url = "https://justmars.github.io/citation-report"
copyright = "Copyright &copy; 2026 Marcelino Veloso III"
nav = [
  { "Overview" = "index.md" },
  { "Patterns" = "patterns.md" },
  { "Extracting reports" = "extraction.md" },
  { "Release notes" = "releases.md" },
  { "Development" = "development.md" },
]

[project.theme]
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.instant",
  "navigation.path",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
